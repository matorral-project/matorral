{% load i18n %}
{# Single subtask row - display mode #}
<tr id="subtask-row-{{ subtask.pk }}">
  <td>
    <span class="font-mono font-semibold text-sm">{{ subtask.key }}</span>
  </td>
  <td class="group">
    <div class="flex items-start gap-2">
      <span class="flex-1 text-sm {% if subtask.status == 'done' or subtask.status == 'wont_do' %}line-through text-base-content/60{% endif %}">
        {{ subtask.title }}
      </span>
      <a href="#"
         class="invisible group-hover:visible text-xs link link-primary whitespace-nowrap"
         hx-get="{% url 'issues:issue_subtask_edit' workspace.slug project.key issue.key subtask.pk %}"
         hx-target="closest tr"
         hx-swap="outerHTML"
         @click.prevent>
        [{% translate "Edit" %}]
      </a>
    </div>
  </td>
  <td>
    {% include "issues/includes/issue_status_badge.html" with status=subtask.status status_display=subtask.get_status_display %}
  </td>
  <td>
    <div class="dropdown dropdown-end dropdown-left">
      <div tabindex="0" role="button" class="btn btn-sm btn-ghost btn-square tooltip tooltip-left" data-tip="{% translate "Actions" %}">
        <i class="fa fa-ellipsis-vertical"></i>
      </div>
      <ul tabindex="0" class="dropdown-content menu bg-base-100 rounded-box z-10 w-40 p-2 shadow">
        <li>
          <button type="button"
                  hx-post="{% url 'issues:issue_subtask_clone' workspace.slug project.key issue.key subtask.pk %}"
                  hx-target="#subtasks-section"
                  hx-swap="outerHTML">
            <i class="fa fa-clone"></i> {% translate "Clone" %}
          </button>
        </li>
        <li>
          <button type="button" class="text-error"
                  hx-post="{% url 'issues:issue_subtask_delete' workspace.slug project.key issue.key subtask.pk %}"
                  hx-target="#subtasks-section"
                  hx-swap="outerHTML"
                  hx-confirm="{% translate "Delete this subtask?" %}">
            <i class="fa fa-trash"></i> {% translate "Delete" %}
          </button>
        </li>
      </ul>
    </div>
  </td>
</tr>
