{% load i18n %}

<div class="card bg-base-100 shadow-lg mt-4">
  <div class="card-body">
    <h3 class="card-title text-lg">{% translate "Demo Credentials" %}</h3>

    <div class="space-y-3">
      <div class="form-control">
        <label class="label">
          <span class="label-text">{% translate "Email" %}</span>
        </label>
        <div class="join">
          <input type="text" value="{{ DEMO_CREDENTIALS_EMAIL }}" class="input input-bordered join-item w-full" readonly id="demo-email">
          <button class="btn join-item" onclick="navigator.clipboard.writeText('{{ DEMO_CREDENTIALS_EMAIL }}')">
            {% translate "Copy" %}
          </button>
        </div>
      </div>

      <div class="form-control">
        <label class="label">
          <span class="label-text">{% translate "Password" %}</span>
        </label>
        <div class="join">
          <input type="text" value="{{ DEMO_CREDENTIALS_PASSWORD }}" class="input input-bordered join-item w-full" readonly id="demo-password">
          <button class="btn join-item" onclick="navigator.clipboard.writeText('{{ DEMO_CREDENTIALS_PASSWORD }}')">
            {% translate "Copy" %}
          </button>
        </div>
      </div>
    </div>

    <div class="card-actions justify-end mt-4">
      <a href="{% url 'account_login' %}" class="btn btn-primary btn-sm" hx-boost="true">
        {% translate "Sign In to Demo" %}
      </a>
    </div>
  </div>
</div>
