{% load i18n forms_tags %}
<p class="text-sm text-gray-500 mb-4">
  {% translate "Create a new sprint to plan and track your team's work." %}
</p>
<form method="post"
      hx-post="{{ request.get_full_path }}"
      hx-target="#new-sprint-modal-content"
      hx-swap="innerHTML">
  {% csrf_token %}
  {% render_form_fields form %}
  <div class="modal-action mt-4">
    <button type="button" class="btn btn-ghost" @click="showNewSprintModal = false">
      {% translate "Cancel" %}
    </button>
    <button type="submit" class="btn btn-primary">
      {% translate "Create Sprint" %}
    </button>
  </div>
</form>
